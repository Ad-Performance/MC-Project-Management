// ─── Supabase helpers ──────────────────────────────────────────────────────
async function loadAll(){
  try {
    const [tasks,members,projects,columns] = await Promise.all([
      db.get("tasks"),db.get("members"),db.get("projects"),db.get("columns")
    ]);
    setState({
      tasks: Array.isArray(tasks) ? tasks.map(mapTask) : [],
      members: Array.isArray(members) ? members : [],
      projects: Array.isArray(projects) ? projects : [],
      columns: Array.isArray(columns) ? columns : [],
      loading: false
    });
  } catch(e){ setState({loading:false}); }
}

function mapTask(r){
  return {
    id:r.id, title:r.title, description:r.description||"",
    projectId:r.project_id, assigneeId:r.assignee_id,
    assigneeIds:r.assignee_ids||[r.assignee_id],
    status:r.status, priority:r.priority,
    hours:parseFloat(r.hours)||2,
    startDate:r.start_date||"", dueDate:r.due_date||"",
    tags:r.tags||[], comments:r.comments||[]
  };
}
function taskPayload(t){
  return {
    title:t.title, description:t.description||"",
    project_id:t.projectId, assignee_id:t.assigneeId,
    assignee_ids:t.assigneeIds||[t.assigneeId],
    status:t.status, priority:t.priority, hours:t.hours||2,
    start_date:t.startDate||null, due_date:t.dueDate||null,
    tags:t.tags||[], comments:t.comments||[]
  };
}

async function addTask(t){
  try{
    const rows = await db.post("tasks",[taskPayload(t)]);
    const saved = Array.isArray(rows)&&rows[0] ? mapTask(rows[0]) : {...t,id:Date.now()};
    setState({tasks:[...state.tasks,saved], modal:null});
    toast("✅","Task created",t.title);
  }catch(e){ toast("❌","Error",e.message); }
}
async function saveTask(t){
  try{
    await db.patch("tasks",t.id,taskPayload(t));
    setState({tasks:state.tasks.map(x=>x.id===t.id?t:x), modal:null, editingTask:null});
    toast("💾","Saved",t.title);
  }catch(e){ toast("❌","Error",e.message); }
}
async function deleteTask(id){
  try{
    await db.del("tasks",id);
    setState({tasks:state.tasks.filter(x=>x.id!==id), modal:null, editingTask:null});
    toast("🗑","Deleted","");
  }catch(e){ toast("❌","Error",e.message); }
}

async function addMember(m){

  }catch(e){ toast("❌","Error",e.message); }

async function saveMember(m){

    await db.patch("members",m.id,{name:m.name,avatar:m.avatar,color:m.color,capacity:m.capacity,teams:m.teams});
    setState({members:state.members.map(x=>x.id===m.id?m:x)});
    toast("💾","Saved",m.name);
  }catch(e){ toast("❌","Error",e.message); }
}
async function deleteMember(id){
  const hasTasks = state.tasks.some(t=>t.assigneeId===id||(t.assigneeIds||[]).includes(id));
  if(hasTasks){ toast("⚠️","Cannot remove","Member has assigned tasks"); return; }
  try{
    await db.del("members",id);
    setState({members:state.members.filter(x=>x.id!==id)});
    toast("🗑","Removed","");
  }catch(e){ toast("❌","Error",e.message); }
}

async function saveProject(p){

async function deleteProject(id){

async function addColumn(col){

  }catch(e){ toast("❌","Error",e.message); }

async function saveColumn(col){
  try{
    await db.patch("columns",col.id,{label:col.label,color:col.color});
    setState({columns:state.columns.map(x=>x.id===col.id?col:x)});
    toast("💾","Column updated",col.label);

}
async function deleteColumn(id){
  const rest = state.columns.filter(x=>x.id!==id);
  if(!rest.length){ toast("⚠️","","Need at least 1 column"); return; }
  const fallback = rest[0].id;
  const tasksToUpdate = state.tasks.filter(t=>t.status===id);
  try{
    await db.del("columns",id);
    for(const t of tasksToUpdate) await db.patch("tasks",t.id,{status:fallback});
    setState({
      columns:rest,
      tasks:state.tasks.map(t=>t.status===id?{...t,status:fallback}:t)
    });
    toast("🗑","Column deleted","");
  }catch(e){ toast("❌","Error",e.message); }
}

function today(){ return new Date().toISOString().slice(0,10); }
function parseHours(s){
  const h=(s.match(/(\d+(?:\.\d+)?)\s*h/i)||[])[1];
  const m=(s.match(/(\d+)\s*m/i)||[])[1];
  return (parseFloat(h||0))+(parseInt(m||0)/60);
}
function fmtHours(h){
  if(!h) return "";
  const hrs=Math.floor(h), mins=Math.round((h-hrs)*60);
  if(hrs&&mins) return `${hrs}h ${mins}m`;
  if(hrs) return `${hrs}h`;
  return `${mins}m`;
}
function wlColor(pct){ return pct<=100?"#10b981":pct<=130?"#f59e0b":"#ef4444"; }
function getWorkload(memberId){
  const active = state.tasks.filter(t=>
    (t.assigneeId===memberId||(t.assigneeIds||[]).includes(memberId)) && t.status!=="done"
  );
  const mem = state.members.find(m=>m.id===memberId);
  const totalHours = active.reduce((s,t)=>s+(t.hours||0),0);
  const pct = mem ? Math.round((totalHours/mem.capacity)*100) : 0;
  return {totalHours, pct, tasks:active};
}

// ─── HTML helpers ──────────────────────────────────────────────────────────
function el(tag,attrs={},children=[]){
  const e = document.createElement(tag);
  for(const [k,v] of Object.entries(attrs)){
    if(k==="style"&&typeof v==="object") Object.assign(e.style,v);
    else if(k.startsWith("on")) e.addEventListener(k.slice(2).toLowerCase(),v);
    else if(k==="className") e.className=v;
    else e.setAttribute(k,v);
  }
  for(const c of children){
    if(c===null||c===undefined) continue;
    e.appendChild(typeof c==="string"||typeof c==="number" ? document.createTextNode(c) : c);
  }
  return e;
}
const div=(a,c)=>el("div",a,c);
const span=(a,c)=>el("span",a,c);
const btn=(a,c)=>el("button",a,c);
const inp=(a)=>el("input",a);
const sel=(a,c)=>el("select",a,c);
const opt=(v,t,s)=>el("option",{value:v,...(s?{selected:""}:{})},[ t]);
const txta=(a)=>el("textarea",a);

function styledBtn(text,bg,color,onClick,extra={}){
  const T=th();
  const b=btn({style:{background:bg,color,border:"none",borderRadius:8,padding:"9px 18px",fontWeight:600,fontSize:14,cursor:"pointer",transition:"opacity .15s",...extra},onClick});
  b.textContent=text;
  b.onmouseenter=()=>b.style.opacity=".85";
  b.onmouseleave=()=>b.style.opacity="1";
  return b;
}

function inputEl(value,placeholder,onChange,style={}){
  const T=th();
  const i=inp({style:{background:T.inputBg,border:`1px solid ${T.border}`,borderRadius:8,padding:"10px 14px",color:T.label,fontSize:14,outline:"none",width:"100%",...style}});
  i.value=value||"";
  i.placeholder=placeholder||"";
  i.oninput=e=>onChange(e.target.value);
  return i;
}

function selectEl(value,options,onChange,style={}){
  const T=th();
  const s=sel({style:{background:T.inputBg,border:`1px solid ${T.border}`,borderRadius:8,padding:"9px 12px",color:T.label,fontSize:14,outline:"none",width:"100%",WebkitAppearance:"none",...style}},
    options.map(o=>opt(o.value,o.label,String(o.value)===String(value)))
  );
  s.onchange=e=>onChange(e.target.value);
  return s;
}

function textareaEl(value,placeholder,onChange,style={}){
  const T=th();
  const t=txta({style:{background:T.inputBg,border:`1px solid ${T.border}`,borderRadius:8,padding:"10px 14px",color:T.label,fontSize:14,outline:"none",width:"100%",resize:"vertical",lineHeight:1.5,...style}});
  t.value=value||"";
  t.placeholder=placeholder||"";
  t.rows=3;
  t.oninput=e=>onChange(e.target.value);
  return t;
}

// ─── List ──────────────────────────────────────────────────────────────────
function buildList(){
  const T=th();
  const today_str=today();
  let tasks=[...state.tasks].filter(t=>{
    if(state.filterMember!=="all"&&!(t.assigneeId===state.filterMember||(t.assigneeIds||[]).includes(state.filterMember))) return false;
    if(state.filterProject!=="all"&&t.projectId!==state.filterProject) return false;
    return true;
  }).sort((a,b)=>{
    let va,vb;
    if(state.sortBy==="dueDate"){va=a.dueDate||"9999";vb=b.dueDate||"9999";}
    else if(state.sortBy==="priority"){const o={high:0,medium:1,low:2};va=o[a.priority]??1;vb=o[b.priority]??1;}
    else if(state.sortBy==="status"){va=a.status||"";vb=b.status||"";}
    else if(state.sortBy==="title"){va=(a.title||"").toLowerCase();vb=(b.title||"").toLowerCase();}
    else if(state.sortBy==="hours"){va=a.hours||0;vb=b.hours||0;}
    if(va<vb) return state.sortAsc?-1:1;
    if(va>vb) return state.sortAsc?1:-1;
    return 0;
  });

  const wrap=div({style:{padding:20,height:"100%",overflowY:"auto"}});

  // Sort bar
  const sortBar=div({style:{display:"flex",alignItems:"center",gap:8,marginBottom:12}});
  sortBar.appendChild(span({style:{fontSize:12,color:T.label2,fontWeight:500}},["Sort by:"]));
  for(const s of [{id:"dueDate",label:"Due Date"},{id:"priority",label:"Priority"},{id:"status",label:"Status"},{id:"title",label:"Name"},{id:"hours",label:"Hours"}]){
    const active=state.sortBy===s.id;
    const b=btn({style:{padding:"5px 11px",borderRadius:8,border:`1px solid ${active?T.accent:T.border}`,background:active?T.accent+"18":"transparent",color:active?T.accent:T.label2,fontSize:12,cursor:"pointer",fontWeight:active?700:400,display:"flex",alignItems:"center",gap:3},onClick:()=>setState({sortBy:s.id,sortAsc:state.sortBy===s.id?!state.sortAsc:true})});
    b.textContent=s.label+(active?(state.sortAsc?" ↑":" ↓"):"");
    sortBar.appendChild(b);
  }
  wrap.appendChild(sortBar);

  const tbl=div({style:{background:T.card,borderRadius:14,border:`1px solid ${T.border}`,overflow:"hidden"}});
  const headers=["Task","Project","Assignee","Priority","Status","Hours","Due"];
  const hdrRow=div({style:{display:"grid",gridTemplateColumns:"2fr 1fr 1fr .8fr .8fr .5fr .7fr",padding:"10px 16px",background:T.tableHead,borderBottom:`1px solid ${T.border}`}});
  for(const h of headers) hdrRow.appendChild(div({style:{fontSize:11,fontWeight:700,color:T.label2,textTransform:"uppercase",letterSpacing:.7}},[h]));
  tbl.appendChild(hdrRow);

  for(const task of tasks){
    const proj=state.projects.find(p=>p.id===task.projectId);
    const mem=state.members.find(m=>m.id===task.assigneeId);
    const col=state.columns.find(c=>c.id===task.status);
    const isOverdue=task.dueDate&&task.dueDate<today_str&&task.status!=="done";
    const row=div({style:{display:"grid",gridTemplateColumns:"2fr 1fr 1fr .8fr .8fr .5fr .7fr",padding:"11px 16px",borderBottom:`1px solid ${T.border}`,cursor:"pointer",transition:"background .1s",alignItems:"center"}});
    row.onmouseenter=()=>row.style.background=T.bg2;
    row.onmouseleave=()=>row.style.background="transparent";
    row.onclick=()=>setState({modal:"editTask",editingTask:{...task}});

    const titleCell=div({style:{display:"flex",alignItems:"center",gap:6}});
    titleCell.appendChild(div({style:{fontSize:14,color:T.label,fontWeight:500,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}},[task.title]));
    if(isOverdue) titleCell.appendChild(span({style:{fontSize:10,fontWeight:700,color:T.overdueColor,background:T.overdueBg,borderRadius:4,padding:"1px 6px",flexShrink:0}},["OVERDUE"]));
    row.appendChild(titleCell);
    row.appendChild(div({},[proj?span({style:{fontSize:12,background:proj.color+"22",color:proj.color,borderRadius:6,padding:"2px 8px",fontWeight:600}},[ `${proj.emoji||""} ${proj.name}`]):div()]));
    const memCell=div({style:{display:"flex",alignItems:"center",gap:6}});
    if(mem){memCell.appendChild(avatar(mem.name,mem.color,22));memCell.appendChild(span({style:{fontSize:13,color:T.label2}},[mem.name]));}
    row.appendChild(memCell);
    row.appendChild(div({},[span({style:{fontSize:12,color:PRIORITY_COLORS[task.priority],fontWeight:600}},[task.priority])]));
    row.appendChild(div({},[col?span({style:{fontSize:12,background:col.color+"22",color:col.color,borderRadius:6,padding:"2px 8px",fontWeight:600}},[col.label]):div()]));
    row.appendChild(div({style:{fontSize:13,color:T.label2}},[fmtHours(task.hours)||task.hours+"h"]));
    row.appendChild(div({style:{fontSize:12,color:isOverdue?T.red:T.label2,fontWeight:isOverdue?700:400}},[task.dueDate||"—"]));
    tbl.appendChild(row);
  }
  wrap.appendChild(tbl);
  return wrap;
}

// ─── Dashboard ─────────────────────────────────────────────────────────────
function buildDashboard(){
  const T=th();
  const today_str=today();
  const tasks=state.tasks;
  const wrap=div({style:{padding:20,overflowY:"auto",height:"100%"}});

  // Stats row
  const statsRow=div({style:{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:14,marginBottom:18}});
  const stats=[
    {label:"Total Tasks",value:tasks.length,color:T.accent,icon:"📋"},
    {label:"In Progress",value:tasks.filter(t=>t.status==="in_progress").length,color:"#3b82f6",icon:"🔄"},
    {label:"Completed",value:tasks.filter(t=>t.status==="done").length,color:T.green,icon:"✅"},
    {label:"Overdue",value:tasks.filter(t=>t.dueDate&&t.dueDate<today_str&&t.status!=="done").length,color:T.red,icon:"⚠️"},
  ];
  for(const s of stats){
    const c=card([
      div({style:{fontSize:26,marginBottom:10}},[s.icon]),
      div({style:{fontSize:34,fontWeight:700,color:s.color,letterSpacing:-1,lineHeight:1}},[s.value]),
      div({style:{fontSize:13,color:T.label2,marginTop:5,fontWeight:500}},[s.label])
    ]);
    statsRow.appendChild(c);
  }
  wrap.appendChild(statsRow);

  // Charts row
  const chartsRow=div({style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14,marginBottom:14}});

  // Tasks by project
  const projCard=card([div({style:{fontSize:15,fontWeight:700,color:T.label,marginBottom:16}},["Tasks by Project"])]);
  for(const p of state.projects){
    const count=tasks.filter(t=>t.projectId===p.id).length;
    const done=tasks.filter(t=>t.projectId===p.id&&t.status==="done").length;
    const pct=tasks.length?Math.round((count/tasks.length)*100):0;
    const donePct=count?Math.round((done/count)*100):0;
    const row=div({style:{marginBottom:14}});
    row.appendChild(div({style:{display:"flex",justifyContent:"space-between",marginBottom:5}});
    row.lastChild.appendChild(span({style:{fontSize:13,color:T.label,fontWeight:500}},[`${p.emoji||""} ${p.name}`]));
    row.lastChild.appendChild(span({style:{fontSize:12,color:T.label2}},[`${done}/${count} done`]));
    const track=div({style:{background:T.bg2,border:`1px solid ${T.border}`,borderRadius:6,height:7,overflow:"hidden",position:"relative"}});
    const bgBar=div({style:{height:"100%",width:`${pct}%`,background:p.color+"33",borderRadius:6}});
    const fgBar=div({style:{position:"absolute",top:0,left:0,height:"100%",width:`${(donePct/100)*pct}%`,background:p.color,borderRadius:6}});
    track.appendChild(bgBar); track.appendChild(fgBar);
    row.appendChild(track);
    projCard.appendChild(row);
  }
  chartsRow.appendChild(projCard);

  // Team workload
  const wlCard=card([div({style:{fontSize:15,fontWeight:700,color:T.label,marginBottom:16}},["Team Workload"])]);
  for(const m of state.members){
    const wl=getWorkload(m.id);
    const color=wlColor(wl.pct);
    const row=div({style:{display:"flex",alignItems:"center",gap:12,marginBottom:14}});
    row.appendChild(avatar(m.name,m.color,32));
    const inner=div({style:{flex:1}});
    const top=div({style:{display:"flex",justifyContent:"space-between",marginBottom:4}});
    top.appendChild(span({style:{fontSize:13,color:T.label,fontWeight:500}},[m.name]));
    top.appendChild(span({style:{fontSize:13,color,fontWeight:700}},[`${wl.pct}%`]));
    inner.appendChild(top);
    const track=div({style:{background:T.bg2,border:`1px solid ${T.border}`,borderRadius:4,height:5,overflow:"hidden"}});
    track.appendChild(div({style:{height:"100%",width:`${Math.min(wl.pct,100)}%`,background:color,borderRadius:4}}));
    inner.appendChild(track);
    row.appendChild(inner);
    wlCard.appendChild(row);
  }
  chartsRow.appendChild(wlCard);
  wrap.appendChild(chartsRow);

  // Completion trend
  const trendCard=card([div({style:{fontSize:15,fontWeight:700,color:T.label,marginBottom:16}},["Completion Trend — Last 14 Days"])]);
  const days14=Array.from({length:14},(_,i)=>{const d=new Date();d.setDate(d.getDate()-13+i);return d.toISOString().slice(0,10);});
  const maxVal=Math.max(...days14.map(d=>tasks.filter(t=>t.dueDate===d&&t.status==="done").length),1);
  const bars=div({style:{display:"flex",gap:4,alignItems:"flex-end",height:70}});
  for(const d of days14){
    const done=tasks.filter(t=>t.dueDate===d&&t.status==="done").length;
    const isToday=d===today_str;
    const barH=Math.max(3,Math.round((done/maxVal)*70));
    const barWrap=div({style:{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:2}});
    barWrap.appendChild(div({style:{width:"100%",height:`${barH}px`,background:done?T.green:T.border,borderRadius:3}}));
    barWrap.appendChild(div({style:{fontSize:8,color:isToday?T.accent:T.label3,fontWeight:isToday?700:400,transform:"rotate(-45deg)",transformOrigin:"center",whiteSpace:"nowrap"}},[d.slice(5)]));
    bars.appendChild(barWrap);
  }
  trendCard.appendChild(bars);
  wrap.appendChild(trendCard);
  return wrap;
}

// ─── Workload Tab ──────────────────────────────────────────────────────────
function buildWorkload(){
  const T=th();
  const today_str=today();
  const wrap=div({style:{padding:20,overflowY:"auto",height:"100%"}});

  if(state.workloadMember){
    const mem=state.members.find(m=>m.id===state.workloadMember);
    const wl=getWorkload(state.workloadMember);

// ─── CEO View ──────────────────────────────────────────────────────────────
function buildCEO(){
  const T=th();
  const today_str=today();
  const tomorrow=new Date(Date.now()+86400000).toISOString().slice(0,10);
  const in7=new Date(Date.now()+7*86400000).toISOString().slice(0,10);
  const tasks=state.tasks;

  const overdue=tasks.filter(t=>t.dueDate&&t.dueDate<today_str&&t.status!=="done");
  const dueToday=tasks.filter(t=>t.dueDate===today_str&&t.status!=="done");
  const dueWeek=tasks.filter(t=>t.dueDate&&t.dueDate>today_str&&t.dueDate<=in7&&t.status!=="done");
  const overloaded=state.members.filter(m=>getWorkload(m.id).pct>130);
  const doneWeek=tasks.filter(t=>{
    const wa=new Date(Date.now()-7*86400000).toISOString().slice(0,10);
    return t.status==="done"&&t.dueDate&&t.dueDate>=wa&&t.dueDate<=today_str;
  });

  const wrap=div({style:{padding:20,overflowY:"auto",height:"100%"}});

  // Weekly digest
  const digest=div({style:{background:T.card,borderRadius:14,border:`1px solid ${T.border}`,borderLeft:`3px solid ${T.accent}`,boxShadow:T.shadow,padding:20,marginBottom:18,background:`linear-gradient(135deg,${T.accent}18,${T.card})`}});
  digest.appendChild(div({style:{fontSize:11,fontWeight:700,color:T.accent,textTransform:"uppercase",letterSpacing:.8,marginBottom:10}},["Weekly Digest"]));
  const dStats=div({style:{display:"flex",gap:24,flexWrap:"wrap"}});
  for(const s of [
    {label:"Completed this week",value:doneWeek.length,color:T.green},
    {label:"In Progress",value:tasks.filter(t=>t.status==="in_progress").length,color:T.accent},
    {label:"Overdue",value:overdue.length,color:T.red},
    {label:"Due Today",value:dueToday.length,color:T.orange},
    {label:"Overloaded Teams",value:overloaded.length,color:T.red},
  ]){
    const s2=div({style:{textAlign:"center"}});
    s2.appendChild(div({style:{fontSize:26,fontWeight:700,color:s.color,letterSpacing:-1,lineHeight:1}},[s.value]));
    s2.appendChild(div({style:{fontSize:11,color:T.label2,marginTop:3}},[s.label]));
    dStats.appendChild(s2);
  }
  digest.appendChild(dStats);
  wrap.appendChild(digest);

  // Alerts
  if(overdue.length||dueToday.length||overloaded.length){
    wrap.appendChild(div({style:{fontSize:15,fontWeight:700,color:T.label,marginBottom:10}},["🚨 Urgent Attention"]));
    const alerts=div({style:{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(280px,1fr))",gap:12,marginBottom:18}});
    const alertCard=(icon,title,count,color,items)=>{
      const c=div({style:{background:T.card,borderRadius:12,border:`1px solid ${T.border}`,borderLeft:`3px solid ${color}`,boxShadow:T.shadow,padding:14}});
      const h=div({style:{display:"flex",alignItems:"center",gap:10,marginBottom:items?.length?10:0}});
      h.appendChild(span({style:{fontSize:18}},[icon]));
      h.appendChild(div({style:{fontSize:13,fontWeight:600,color:T.label,flex:1}},[title]));
      h.appendChild(div({style:{fontSize:22,fontWeight:700,color}},[count]));
      c.appendChild(h);
      if(items?.length){
        for(const task of items.slice(0,3)){
          const r=div({style:{fontSize:12,color:T.label2,background:T.bg2,borderRadius:6,padding:"5px 10px",marginBottom:4,cursor:"pointer",display:"flex",alignItems:"center",gap:6}});
          r.onclick=()=>setState({modal:"editTask",editingTask:{...task}});
          r.appendChild(div({style:{width:5,height:5,borderRadius:"50%",background:color,flexShrink:0}}));
          r.appendChild(span({style:{flex:1,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}},[task.title]));
          if(task.dueDate) r.appendChild(span({style:{color,fontSize:11,fontWeight:600,flexShrink:0}},[task.dueDate.slice(5)]));
          c.appendChild(r);
        }
        if(items.length>3) c.appendChild(div({style:{fontSize:11,color:T.label3,paddingLeft:10}},[`+${items.length-3} more`]));
      }
      return c;
    };
    if(overdue.length) alerts.appendChild(alertCard("🔴","Overdue Tasks",overdue.length,T.red,overdue));
    if(dueToday.length) alerts.appendChild(alertCard("🟠","Due Today",dueToday.length,T.orange,dueToday));
    if(dueWeek.length) alerts.appendChild(alertCard("🟡","Due This Week",dueWeek.length,T.orange,dueWeek));
    if(overloaded.length){
      const c=div({style:{background:T.card,borderRadius:12,border:`1px solid ${T.border}`,borderLeft:`3px solid ${T.red}`,boxShadow:T.shadow,padding:14}});
      c.appendChild(div({style:{fontSize:13,fontWeight:600,color:T.label,marginBottom:10}},["⚡ Overloaded Members"]));
      for(const mem of overloaded){
        const wl=getWorkload(mem.id);
        const r=div({style:{display:"flex",alignItems:"center",gap:8,background:T.bg2,borderRadius:6,padding:"6px 10px",marginBottom:5}});
        r.appendChild(avatar(mem.name,mem.color,22));
        r.appendChild(span({style:{fontSize:12,color:T.label,flex:1}},[mem.name]));
        r.appendChild(span({style:{fontSize:13,fontWeight:700,color:T.red}},[`${wl.pct}%`]));
        c.appendChild(r);
      }
      alerts.appendChild(c);
    }
    wrap.appendChild(alerts);
  }

  // Team overview
  wrap.appendChild(div({style:{fontSize:15,fontWeight:700,color:T.label,marginBottom:12}},["🏢 Team Overview"]));
  const teamGrid=div({style:{display:"grid",gridTemplateColumns:"repeat(2,1fr)",gap:14,marginBottom:18}});
  for(const team of TEAMS){
    const teamMems=state.members.filter(m=>(m.teams||[]).includes(team));
    const teamIds=teamMems.map(m=>m.id);
    const teamTasks=tasks.filter(t=>(t.assigneeIds||[t.assigneeId]).some(id=>teamIds.includes(id)));
    const done=teamTasks.filter(t=>t.status==="done").length;
    const ov=teamTasks.filter(t=>t.dueDate&&t.dueDate<today_str&&t.status!=="done").length;
    const totalHrs=teamTasks.filter(t=>t.status!=="done").reduce((s,t)=>s+(t.hours||0),0);
    const capHrs=teamMems.reduce((s,m)=>s+(m.capacity||40),0);
    const wlPct=capHrs?Math.round((totalHrs/capHrs)*100):0;
    const donePct=teamTasks.length?Math.round((done/teamTasks.length)*100):0;
    const color=wlColor(wlPct);
    const c=card([]);
    c.style.padding="18px";
    const hdr=div({style:{display:"flex",alignItems:"center",gap:10,marginBottom:12}});
    const icon=div({style:{width:38,height:38,borderRadius:10,background:TEAM_COLORS[team]+"22",display:"flex",alignItems:"center",justifyContent:"center",fontSize:18,flexShrink:0}});
    icon.textContent={BizDev:"💼",AM:"🤝",AdOps:"📢",Creative:"🎨"}[team]||"📁";
    hdr.appendChild(icon);
    const ti=div({style:{flex:1}});
    ti.appendChild(div({style:{fontSize:15,fontWeight:700,color:T.label}},[team]));
    ti.appendChild(div({style:{fontSize:11,color:T.label2}},[`${teamMems.length} members · ${teamTasks.length} tasks`]));
    hdr.appendChild(ti);
    hdr.appendChild(span({style:{fontSize:11,fontWeight:700,color:ov>0?T.red:T.green,background:(ov>0?T.red:T.green)+"18",borderRadius:20,padding:"2px 10px"}},[ov>0?`${ov} overdue`:"On track ✓"]));
    c.appendChild(hdr);
    const track1=div({style:{marginBottom:10}});
    track1.appendChild(div({style:{display:"flex",justifyContent:"space-between",marginBottom:4}});
    track1.lastChild.appendChild(span({style:{fontSize:11,color:T.label2}},["Completion"]));
    track1.lastChild.appendChild(span({style:{fontSize:11,fontWeight:700,color:T.label}},[`${donePct}% (${done}/${teamTasks.length})`]));
    const pb1=div({style:{background:T.bg2,border:`1px solid ${T.border}`,borderRadius:6,height:6,overflow:"hidden"}});
    pb1.appendChild(div({style:{height:"100%",width:`${donePct}%`,background:TEAM_COLORS[team],borderRadius:6}}));
    track1.appendChild(pb1);
    c.appendChild(track1);
    const track2=div({style:{marginBottom:12}});
    track2.appendChild(div({style:{display:"flex",justifyContent:"space-between",marginBottom:4}});
    track2.lastChild.appendChild(span({style:{fontSize:11,color:T.label2}},["Workload"]));
    track2.lastChild.appendChild(span({style:{fontSize:11,fontWeight:700,color}},[`${wlPct}%`]));
    const pb2=div({style:{background:T.bg2,border:`1px solid ${T.border}`,borderRadius:6,height:6,overflow:"hidden"}});
    pb2.appendChild(div({style:{height:"100%",width:`${Math.min(wlPct,100)}%`,background:color,borderRadius:6}}));
    track2.appendChild(pb2);
    c.appendChild(track2);
    const mems=div({style:{display:"flex",gap:6,flexWrap:"wrap"}});
    for(const mem of teamMems){
      const wl=getWorkload(mem.id);
      const c2=wlColor(wl.pct);
      const chip=div({style:{display:"flex",alignItems:"center",gap:5,background:T.bg2,border:`1px solid ${T.border}`,borderRadius:20,padding:"3px 10px 3px 4px"}});
      chip.appendChild(avatar(mem.name,mem.color,20));
      chip.appendChild(span({style:{fontSize:11,color:T.label}},[mem.name]));
      chip.appendChild(span({style:{fontSize:10,fontWeight:700,color:c2}},[`${wl.pct}%`]));
      mems.appendChild(chip);
    }
    if(!teamMems.length) mems.appendChild(span({style:{fontSize:12,color:T.label3}},["No members"]));
    c.appendChild(mems);
    teamGrid.appendChild(c);
  }
  wrap.appendChild(teamGrid);

  // People overview
  wrap.appendChild(div({style:{fontSize:15,fontWeight:700,color:T.label,marginBottom:12}},["👤 People Overview"]));
  const people=div({style:{background:T.card,borderRadius:14,border:`1px solid ${T.border}`,overflow:"hidden"}});
  state.members.forEach((mem,i)=>{
    const wl=getWorkload(mem.id);
    const color=wlColor(wl.pct);
    const ov=wl.tasks.filter(t=>t.dueDate&&t.dueDate<today_str).length;
    const dc=state.tasks.filter(t=>(t.assigneeId===mem.id||(t.assigneeIds||[]).includes(mem.id))&&t.status==="done").length;
    const row=div({style:{display:"flex",alignItems:"center",gap:14,padding:"13px 18px",borderBottom:i<state.members.length-1?`1px solid ${T.border}`:"none",transition:"background .1s"}});
    row.onmouseenter=()=>row.style.background=T.bg2;
    row.onmouseleave=()=>row.style.background="transparent";
    row.appendChild(avatar(mem.name,mem.color,38));
    const info=div({style:{minWidth:130}});
    info.appendChild(div({style:{fontSize:14,fontWeight:600,color:T.label}},[mem.name]));
    const chips=div({style:{display:"flex",gap:4,marginTop:3,flexWrap:"wrap"}});
    for(const t of (mem.teams||[])) chips.appendChild(span({style:{fontSize:10,background:TEAM_COLORS[t]+"22",color:TEAM_COLORS[t],borderRadius:10,padding:"1px 7px",fontWeight:600}},[t]));
    info.appendChild(chips);
    row.appendChild(info);
    const wlDiv=div({style:{flex:1}});
    const wlTop=div({style:{display:"flex",justifyContent:"space-between",marginBottom:4}});
    wlTop.appendChild(span({style:{fontSize:11,color:T.label2}},[`${wl.totalHours}h / ${mem.capacity}h`]));
    wlTop.appendChild(span({style:{fontSize:11,fontWeight:700,color}},[`${wl.pct}%`]));
    wlDiv.appendChild(wlTop);
    const wlBar=div({style:{background:T.bg2,border:`1px solid ${T.border}`,borderRadius:4,height:5,overflow:"hidden"}});
    wlBar.appendChild(div({style:{height:"100%",width:`${Math.min(wl.pct,100)}%`,background:color,borderRadius:4}}));
    wlDiv.appendChild(wlBar);
    row.appendChild(wlDiv);
    const statsDiv=div({style:{display:"flex",gap:14,flexShrink:0}});
    for(const s of [{label:"Active",value:wl.tasks.length,color:T.label},{label:"Done",value:dc,color:T.green},{label:"Overdue",value:ov,color:ov>0?T.red:T.label3}]){
      const sd=div({style:{textAlign:"center"}});
      sd.appendChild(div({style:{fontSize:16,fontWeight:700,color:s.color}},[s.value]));
      sd.appendChild(div({style:{fontSize:10,color:T.label3}},[s.label]));
      statsDiv.appendChild(sd);
    }
    row.appendChild(statsDiv);
    people.appendChild(row);
  });
  wrap.appendChild(people);
  return wrap;
}

function buildAddTaskModal(){

  const setTask=t=>{task=t;};
  const content=taskForm(task,setTask);
  const footer=[
    styledBtn("Cancel",T.bg2,T.label2,()=>setState({modal:null,editingTask:null}),{border:`1px solid ${T.border}`}),
    styledBtn("Add Task",T.accent,T.accentText,async()=>{
      if(!task.title.trim()){alert("Please enter a task title");return;}
      await addTask(task);
    })

  return modal("New Task",content,footer,true);
}

function buildEditTaskModal(){
  const T=th();
  let task={...state.editingTask};
  const setTask=t=>{task=t;};
  const content=taskForm(task,setTask);
  const footer=[
    styledBtn("🗑 Delete",T.red+"22",T.red,async()=>{if(confirm("Delete this task?")) await deleteTask(task.id);}),

      if(!task.title.trim()){alert("Please enter a task title");return;}

  ];
  return modal("Edit Task",content,footer,true);
}

// ─── Notification panel ────────────────────────────────────────────────────
function buildNotifPanel(){
  const T=th();
  const today_str=today();
  const tom=new Date(Date.now()+86400000).toISOString().slice(0,10);
  const groups=[
    {label:"Overdue",items:state.tasks.filter(t=>t.dueDate&&t.dueDate<today_str&&t.status!=="done"),color:T.red},
    {label:"Due Today",items:state.tasks.filter(t=>t.dueDate===today_str&&t.status!=="done"),color:T.orange},
    {label:"Due Tomorrow",items:state.tasks.filter(t=>t.dueDate===tom&&t.status!=="done"),color:T.orange},
  ].filter(g=>g.items.length);

  const panel=div({style:{position:"fixed",top:62,right:16,width:310,background:T.card,border:`1px solid ${T.border}`,borderRadius:14,boxShadow:T.shadowLg,zIndex:99,overflow:"hidden"}});
  const hdr=div({style:{padding:"13px 18px",borderBottom:`1px solid ${T.border}`,display:"flex",alignItems:"center",justifyContent:"space-between"}});
  hdr.appendChild(span({style:{fontWeight:700,fontSize:15,color:T.label}},["Notifications"]));
  const x=btn({style:{background:"none",border:"none",color:T.label2,cursor:"pointer",fontSize:20,lineHeight:1,padding:0},onClick:()=>setState({notifOpen:false})},["×"]);
  hdr.appendChild(x);
  panel.appendChild(hdr);

  const body=div({style:{maxHeight:380,overflowY:"auto"}});
  if(!groups.length){
    body.appendChild(div({style:{padding:32,textAlign:"center",color:T.label2,fontSize:14}},["✅ All caught up!"]));
  }
  for(const g of groups){
    body.appendChild(div({style:{padding:"9px 18px 5px",fontSize:11,fontWeight:700,color:T.label2,textTransform:"uppercase",letterSpacing:.7}},[g.label]));
    for(const task of g.items){
      const proj=state.projects.find(p=>p.id===task.projectId);
      const mem=state.members.find(m=>m.id===task.assigneeId);
      const row=div({style:{padding:"9px 18px",borderBottom:`1px solid ${T.border}`,display:"flex",gap:10,cursor:"pointer"}});
      row.onclick=()=>{setState({notifOpen:false,modal:"editTask",editingTask:{...task}});};
      row.appendChild(div({style:{width:7,height:7,borderRadius:"50%",background:g.color,marginTop:5,flexShrink:0}}));
      const info=div({});
      info.appendChild(div({style:{fontSize:13,fontWeight:500,color:T.label,lineHeight:1.4}},[task.title]));
      info.appendChild(div({style:{fontSize:11,color:T.label2,marginTop:2}},[`${proj?.name||""} · ${mem?.name||""} · ${task.dueDate||""}`]));
      row.appendChild(info);
      body.appendChild(row);
    }
  }
  panel.appendChild(body);
  return panel;
}

// ─── Loading ───────────────────────────────────────────────────────────────
function buildLoading(){

// ─── Render ────────────────────────────────────────────────────────────────
function render(){
  const app=document.getElementById("app");
  app.innerHTML="";

  if(state.loading){ app.appendChild(buildLoading()); return; }

  const T=th();
  app.style.background=T.bg;
  app.style.color=T.label;

  const root=div({style:{display:"flex",height:"100vh",overflow:"hidden"}});
  root.appendChild(buildSidebar());

  const main=div({style:{flex:1,display:"flex",flexDirection:"column",overflow:"hidden"}});
  main.appendChild(buildTopbar());

  const content=div({style:{flex:1,overflow:"hidden",display:"flex",flexDirection:"column"}});
  if(state.tab==="tasks"){
    if(state.view==="board") content.appendChild(buildBoard());
    else if(state.view==="list") content.appendChild(buildList());
    else if(state.view==="calendar") content.appendChild(buildCalendar());
    else if(state.view==="gantt") content.appendChild(buildGantt());
  } else if(state.tab==="workload") content.appendChild(buildWorkload());
  else if(state.tab==="ceo") content.appendChild(buildCEO());
  else if(state.tab==="dashboard") content.appendChild(buildDashboard());
  main.appendChild(content);

  root.appendChild(main);
  app.appendChild(root);

  // Modals
  if(state.modal==="addTask") app.appendChild(buildAddTaskModal());
  else if(state.modal==="editTask"&&state.editingTask) app.appendChild(buildEditTaskModal());
  else if(state.modal==="manageTeam") app.appendChild(buildManageTeamModal());
  else if(state.modal==="manageSpaces") app.appendChild(buildManageSpacesModal());
  else if(state.modal==="manageCols") app.appendChild(buildManageColsModal());

  // Notif
  if(state.notifOpen) app.appendChild(buildNotifPanel());

  // Toasts
  if(state.toasts.length) app.appendChild(buildToasts());
}

// ─── Calendar & Gantt stubs ────────────────────────────────────────────────
function buildCalendar(){
  const T=th();
  const today_str=today();
  let month=new Date().getMonth(), year=new Date().getFullYear();
  const DAYS=["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
  const MONTHS=["January","February","March","April","May","June","July","August","September","October","November","December"];

  const wrap=div({style:{padding:20,overflowY:"auto",height:"100%"}});
  const rebuild=()=>{
    wrap.innerHTML="";
    const nav=div({style:{display:"flex",alignItems:"center",gap:14,marginBottom:18}});
    const prevBtn=btn({style:{width:34,height:34,borderRadius:8,background:T.card,border:`1px solid ${T.border}`,color:T.label2,cursor:"pointer",fontSize:18},onClick:()=>{month--;if(month<0){month=11;year--;}rebuild();}},["‹"]);
    const nextBtn=btn({style:{width:34,height:34,borderRadius:8,background:T.card,border:`1px solid ${T.border}`,color:T.label2,cursor:"pointer",fontSize:18},onClick:()=>{month++;if(month>11){month=0;year++;}rebuild();}},["›"]);
    nav.appendChild(prevBtn);
    nav.appendChild(div({style:{fontSize:20,fontWeight:700,color:T.label}},[`${MONTHS[month]} ${year}`]));
    nav.appendChild(nextBtn);
    wrap.appendChild(nav);

    const grid=div({style:{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:4}});
    for(const d of DAYS) grid.appendChild(div({style:{textAlign:"center",fontSize:11,fontWeight:700,color:T.label3,textTransform:"uppercase",letterSpacing:.8,padding:"4px 0"}},[d]));

    const firstDay=new Date(year,month,1).getDay();
    const daysInMonth=new Date(year,month+1,0).getDate();
    for(let i=0;i<firstDay;i++) grid.appendChild(div({}));

    const tasks=state.tasks.filter(t=>{
      if(state.filterMember!=="all"&&!(t.assigneeId===state.filterMember||(t.assigneeIds||[]).includes(state.filterMember))) return false;
      if(state.filterProject!=="all"&&t.projectId!==state.filterProject) return false;
      return true;
    });

    for(let d=1;d<=daysInMonth;d++){
      const dateStr=`${year}-${String(month+1).padStart(2,"0")}-${String(d).padStart(2,"0")}`;
      const dayTasks=tasks.filter(t=>t.dueDate===dateStr);
      const isToday=dateStr===today_str;
      const cell=div({style:{background:T.card,border:`1px solid ${T.border}`,borderRadius:10,minHeight:82,padding:"7px",boxShadow:T.shadow}});
      const dayNum=div({style:{width:24,height:24,borderRadius:"50%",display:"flex",alignItems:"center",justifyContent:"center",fontSize:13,fontWeight:isToday?700:400,background:isToday?T.accent:"transparent",color:isToday?"#fff":T.label2,marginBottom:4}});
      dayNum.textContent=d;
      cell.appendChild(dayNum);
      for(const task of dayTasks.slice(0,3)){
        const proj=state.projects.find(p=>p.id===task.projectId);
        const tc=div({style:{background:(proj?.color||T.accent)+"22",borderLeft:`2px solid ${proj?.color||T.accent}`,borderRadius:4,padding:"2px 5px",cursor:"pointer",fontSize:10,color:T.label,marginBottom:2,fontWeight:500,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}});
        tc.textContent=task.title;
        tc.onclick=()=>setState({modal:"editTask",editingTask:{...task}});
        cell.appendChild(tc);
      }
      if(dayTasks.length>3) cell.appendChild(div({style:{fontSize:9,color:T.label3}},[`+${dayTasks.length-3} more`]));
      grid.appendChild(cell);
    }
    wrap.appendChild(grid);
  };
  rebuild();
  return wrap;
}

function buildGantt(){
  const T=th();
  let month=new Date().getMonth(), year=new Date().getFullYear();
  const MONTHS=["January","February","March","April","May","June","July","August","September","October","November","December"];
  const DAY_W=32, ROW_H=44;

  const wrap=div({style:{padding:20,overflowY:"auto",height:"100%"}});
  const rebuild=()=>{
    wrap.innerHTML="";
    const nav=div({style:{display:"flex",alignItems:"center",gap:14,marginBottom:18}});
    nav.appendChild(btn({style:{width:34,height:34,borderRadius:8,background:T.card,border:`1px solid ${T.border}`,color:T.label2,cursor:"pointer",fontSize:18},onClick:()=>{month--;if(month<0){month=11;year--;}rebuild();}},["‹"]));
    nav.appendChild(div({style:{fontSize:20,fontWeight:700,color:T.label}},[`${MONTHS[month]} ${year}`]));
    nav.appendChild(btn({style:{width:34,height:34,borderRadius:8,background:T.card,border:`1px solid ${T.border}`,color:T.label2,cursor:"pointer",fontSize:18},onClick:()=>{month++;if(month>11){month=0;year++;}rebuild();}},["›"]));
    wrap.appendChild(nav);

    const daysInMonth=new Date(year,month+1,0).getDate();
    const days=Array.from({length:daysInMonth},(_,i)=>i+1);
    const today_str=today();
    const todayDay=new Date().getFullYear()===year&&new Date().getMonth()===month?new Date().getDate():null;

    const tasks=state.tasks.filter(t=>{
      if(state.filterMember!=="all"&&!(t.assigneeId===state.filterMember||(t.assigneeIds||[]).includes(state.filterMember))) return false;
      if(state.filterProject!=="all"&&t.projectId!==state.filterProject) return false;
      return t.dueDate;
    });

    const tbl=div({style:{background:T.card,borderRadius:14,border:`1px solid ${T.border}`,overflow:"hidden"}});

    // Header
    const hdr=div({style:{display:"flex",borderBottom:`1px solid ${T.border}`}});
    hdr.appendChild(div({style:{width:200,flexShrink:0,padding:"9px 14px",fontSize:11,fontWeight:700,color:T.label2,textTransform:"uppercase",letterSpacing:.7,borderRight:`1px solid ${T.border}`,background:T.bg2}},["Task"]));
    const dayHdr=div({style:{display:"flex",overflowX:"hidden",background:T.bg2,flex:1}});
    for(const d of days){
      const isWknd=new Date(year,month,d).getDay()===0||new Date(year,month,d).getDay()===6;
      const cell=div({style:{width:DAY_W,flexShrink:0,textAlign:"center",padding:"9px 0 7px",fontSize:11,fontWeight:d===todayDay?700:400,color:d===todayDay?T.accent:isWknd?T.label3:T.label2,borderRight:`1px solid ${T.border}`,background:isWknd?"rgba(0,0,0,.03)":"transparent"}});
      cell.textContent=d;
      dayHdr.appendChild(cell);
    }
    hdr.appendChild(dayHdr);
    tbl.appendChild(hdr);

    const tbody=div({style:{overflowY:"auto",maxHeight:"calc(100vh - 280px)"}});
    tasks.forEach((task,idx)=>{
      const proj=state.projects.find(p=>p.id===task.projectId);
      const mem=state.members.find(m=>m.id===task.assigneeId);
      const col=state.columns.find(c=>c.id===task.status);
      const due=new Date(task.dueDate);
      const dueDay=due.getFullYear()===year&&due.getMonth()===month?due.getDate():null;
      const barLen=Math.max(1,Math.ceil(task.hours/8));
      const barStart=dueDay?Math.max(1,dueDay-barLen+1):null;

      const row=div({style:{display:"flex",borderBottom:`1px solid ${T.border}`,height:ROW_H,background:idx%2===0?T.card:T.bg,transition:"background .1s",cursor:"pointer"}});
      row.onmouseenter=()=>row.style.background=T.bg2;
      row.onmouseleave=()=>row.style.background=idx%2===0?T.card:T.bg;
      row.onclick=()=>setState({modal:"editTask",editingTask:{...task}});

      const lbl=div({style:{width:200,flexShrink:0,display:"flex",alignItems:"center",gap:8,padding:"0 14px",borderRight:`1px solid ${T.border}`}});
      lbl.appendChild(div({style:{width:7,height:7,borderRadius:"50%",background:proj?.color||T.accent,flexShrink:0}}));
      const lt=div({style:{flex:1,minWidth:0}});
      lt.appendChild(div({style:{fontSize:12,fontWeight:500,color:T.label,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}},[task.title]));
      if(mem) lt.appendChild(div({style:{fontSize:10,color:T.label2,marginTop:1}},[mem.name]));
      lbl.appendChild(lt);
      row.appendChild(lbl);

      const timeline=div({style:{display:"flex",position:"relative",flex:1}});
      for(const d of days){
        const isWknd=new Date(year,month,d).getDay()===0||new Date(year,month,d).getDay()===6;
        const isBar=barStart&&dueDay&&d>=barStart&&d<=dueDay;
        const isS=d===barStart, isE=d===dueDay;
        const dc=div({style:{width:DAY_W,flexShrink:0,height:"100%",position:"relative",background:d===todayDay?T.accent+"10":isWknd?"rgba(0,0,0,.02)":"transparent",borderRight:`1px solid ${T.border}`,display:"flex",alignItems:"center"}});
        if(isBar){
          const bar=div({style:{position:"absolute",left:isS?"3px":"0",right:isE?"3px":"0",height:20,background:(col?.color||T.accent)+"cc",borderRadius:isS&&isE?"6px":isS?"6px 0 0 6px":isE?"0 6px 6px 0":"0",display:"flex",alignItems:"center",justifyContent:"flex-end",padding:"0 5px"}});
          if(isE) bar.appendChild(span({style:{fontSize:9,color:"#fff",fontWeight:700,whiteSpace:"nowrap"}},[`⏱${task.hours}h`]));
          dc.appendChild(bar);
        }
        if(d===todayDay) dc.appendChild(div({style:{position:"absolute",top:0,bottom:0,left:"50%",width:"1.5px",background:T.accent,opacity:.5}}));
        timeline.appendChild(dc);
      }
      row.appendChild(timeline);
      tbody.appendChild(row);
    });
    tbl.appendChild(tbody);
    wrap.appendChild(tbl);
  };
  rebuild();
  return wrap;
}

// ─── Boot ──────────────────────────────────────────────────────────────────
render();
loadAll();
</script>
